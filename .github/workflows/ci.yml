name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Fixture site
        run: |
          hns-topology bootstrap-fixture --fixture tests/fixtures/sample_hsd_names.json --db data/topology.sqlite
          hns-topology generate-site --db data/topology.sqlite --out public
          test -f public/data/summary.json
          test -f public/data/topology.sqlite.gz

