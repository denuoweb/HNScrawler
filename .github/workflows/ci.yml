name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Script syntax
        run: |
          bash -n scripts/*.sh
          node --check scripts/hsd-export-names-jsonl.js
      - name: Test
        run: pytest
      - name: Fixture site
        run: |
          hns-topology bootstrap-fixture --fixture tests/fixtures/sample_hsd_names.json --db data/topology.sqlite
          hns-topology generate-site --db data/topology.sqlite --out public
          hns-topology validate-release --db data/topology.sqlite --public-dir public
          hns-topology validate-public --public-dir public
          hns-topology archive-release --db data/topology.sqlite --public-dir public --out-dir archives --keep 2
          test "$(find archives -name '*-manifest.json' | wc -l)" -eq 1
          test "$(find archives -name '*-site.tar.gz' | wc -l)" -eq 1
          test "$(find archives -name '*-topology.sqlite.gz' | wc -l)" -eq 1
